<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Coverflow</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0C121C;
      font-family: inter, pretendard;
    }

    .page {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .background-glow {
      position: absolute;
      width: 900px;
      height: 500px;
      background: radial-gradient(circle, rgba(40,40,40,0.5) 0%, rgba(0,0,0,0) 70%);
      filter: blur(80px);
    }

    .scene {
      width: 100%;
      height: 100%;
      position: relative;
      perspective: 2600px;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      position: absolute;
      width: 250px;
      height: 400px;
      border-radius: 16px;
      overflow: hidden;
      background: #0C121C;
      transition:
        transform 1.35s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 1.2s ease,
        filter 1.2s ease,
        z-index 0.2s linear;
      will-change: transform;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
      transform-style: preserve-3d;
		
    }

    .card {
  background: var(--bg);
}
	  .card-bg {
  position: absolute;
  inset: 0;
  background: inherit;
}

.card-icon {
  position: absolute;
  top: 36px;
  left: 36px;

  width: 64px;
  height: 64px;

  object-fit: contain;

  z-index: 5;
}

    .overlay {
      position: absolute;
      left: 28px;
      bottom: 48px;
      color: white;
      z-index: 5;
    }

    .small-text {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0px;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .title {
      font-size: 32px;
      font-weight: 300;
      line-height: 1.05;
    }


    .reflection {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.12), rgba(255,255,255,0));
      pointer-events: none;
    }

    .guide {
      position: absolute;
      bottom: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="background-glow"></div>

  <div class="scene" id="scene"></div>

  <div class="guide">
    Scroll Down ↓
  </div>
</div>

<script>
  const cards = [
    {
      id: 1,
      title: 'Electronic Payment Gateway(PG)',
	  color: '#E65C00', // 오렌지색 배경
      icon: 'icon_pg.png' // 아이콘 파일명
    },
    {
      id: 2,
      title: 'Prepaid Electronic Payment InstrumentE',
      color: '#E65C00', // 오렌지색 배경
      icon: 'icon_pg.png' // 아이콘 파일명
    },
    {
      id: 3,
      title: 'DIGITAL BANKING',
		color: '#E65C00', // 오렌지색 배경
      icon: 'icon_pg.png' // 아이콘 파일명
	
    },
    {
      id: 4,
      title: 'MOBILE COMMERCE',
		color: '#E65C00', // 오렌지색 배경
      icon: 'icon_pg.png' // 아이콘 파일명
    },
    {
      id: 5,
      title: 'AIOT PLATFORM',
	color: '#E65C00', // 오렌지색 배경
      icon: 'icon_pg.png' // 아이콘 파일명
    },
    {
      id: 6,
      title: 'SEAMLESS WORLD',
		color: '#E65C00', // 오렌지색 배경
      icon: 'icon_pg.png' // 아이콘 파일명
    }
  ];

  const scene = document.getElementById('scene');

  let active = 0;
  let isAnimating = false;

  function getRelativePosition(index) {
    const total = cards.length;
    let diff = index - active;

    if (diff > total / 2) diff -= total;
    if (diff < -total / 2) diff += total;

    return diff;
  }

  function getCardStyle(position) {
    const abs = Math.abs(position);

    if (position === 0) {
      return {
        transform: 'translateX(0px) scale(1.12) rotateY(0deg)',
        zIndex: 100,
        opacity: 1,
        filter: 'brightness(1)'
      };
    }

    const direction = position > 0 ? 1 : -1;

    return {
      transform: `
        translate3d(${direction * (220 + (abs - 1) * 150)}px, 0, ${-abs * 120}px)
        scale(${1 - abs * 0.12})
        rotateY(${direction * -32}deg)
      `,
      zIndex: 100 - abs,
      opacity: 1,
      filter: 'brightness(0.65)'
    };
  }

  function renderCards() {
    // keep DOM nodes for smooth animation

    cards.forEach((card, index) => {
      const position = getRelativePosition(index);
      const style = getCardStyle(position);

      let cardElement = document.querySelector(`[data-id="${card.id}"]`);

      if (!cardElement) {
        cardElement = document.createElement('div');
      cardElement.className = 'card';
        cardElement.setAttribute('data-id', card.id);

      Object.assign(cardElement.style, style);
		  

      cardElement.innerHTML = `
        <div class="card-content" style="background-color: ${card.color}; width: 100%; height: 100%;">
    <img src="${card.icon}" class="card-icon" alt="icon" />
    
    <div class="overlay">
      <div class="title">${card.title}</div>
    </div>
    
    <div class="reflection"></div>
  </div>
`;

      scene.appendChild(cardElement);
      }

      requestAnimationFrame(() => {
        Object.assign(cardElement.style, style);
      });
    });
  }

  renderCards();

  window.addEventListener('wheel', (e) => {
    e.preventDefault();

    if (isAnimating) return;
    isAnimating = true;

    if (e.deltaY > 0) {
      active = (active + 1) % cards.length;
    } else {
      active = (active - 1 + cards.length) % cards.length;
    }

    renderCards();

    setTimeout(() => {
      isAnimating = false;
    }, 1150);
  }, { passive: false });
</script>

</body>
</html>
